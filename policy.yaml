version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /opt
  - /var/log
  - /sys/devices/system
  - /dev/shm
  read_write:
  - /sandbox
  - /PeTTa
  - /tmp
  - /dev/null
  - /opt/huggingface
  - /opt/sentence_transformers
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
